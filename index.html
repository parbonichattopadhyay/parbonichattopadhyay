<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="author" content="Parboni Chattopadhyay">
    <meta name="description" content="Personal portfolio website">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parboni Chattopadhyay</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { overflow: hidden; }

        /* === CANVAS BACKGROUND === */
        #tech-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* === HERO === */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }

        .hero-inner {
            display: flex;
            align-items: center;
            gap: 5rem;
            max-width: 1100px;
            width: 100%;
        }

        /* === PHOTO FRAME === */
        .photo-frame {
            position: relative;
            flex-shrink: 0;
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(255, 111, 163, 0.35);
            border-radius: 4px;
            transform: rotate(3deg);
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), border-color 0.4s;
        }

        .photo-frame:hover::before {
            transform: rotate(0deg);
            border-color: rgba(255,111,163,0.7);
        }

        .photo-frame::after {
            content: '';
            position: absolute;
            inset: -18px;
            border: 1px solid rgba(199,146,234,0.15);
            border-radius: 4px;
            transform: rotate(-1.5deg);
            transition: transform 0.6s cubic-bezier(0.4,0,0.2,1), border-color 0.4s;
        }

        .photo-frame:hover::after {
            transform: rotate(0deg);
            border-color: rgba(199,146,234,0.35);
        }

        .profile-image {
            width: 300px;
            height: 380px;
            object-fit: cover;
            object-position: top center;
            display: block;
            border-radius: 3px;
            filter: none;
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), box-shadow 0.5s;
            position: relative;
            z-index: 1;
        }

        .photo-frame:hover .profile-image {
            transform: scale(1.015);
            box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 50px rgba(255,111,163,0.12);
        }

        /* === TEXT === */
        .hero-text { flex: 1; }

        .hero-label {
            font-size: 0.68rem;
            color: #ff6fa3;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            margin-bottom: 1.3rem;
            font-family: 'Space Grotesk', sans-serif;
            opacity: 0;
            animation: fadeInUp 0.7s ease 0.1s forwards;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 5.5vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.05;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(24px);
            animation: fadeInUp 0.8s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
            color: #ffffff;
        }

        .title {
            font-size: 1.1rem;
            color: #ff6fa3;
            font-weight: 400;
            min-height: 1.8em;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.35s forwards;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: #ff6fa3;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        .navigation { display: flex; gap: 0.6rem; flex-wrap: wrap; }

        /* === SCROLL BUTTON === */
        .scroll-hint {
            position: absolute;
            bottom: 2.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
            cursor: pointer;
            text-decoration: none;
        }

        .scroll-hint span {
            font-size: 0.6rem;
            color: #ff6fa3;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
        }

        .scroll-line {
            width: 1px;
            height: 38px;
            background: linear-gradient(to bottom, #ff6fa3, transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.4; transform: scaleY(1); }
            50%       { opacity: 1;   transform: scaleY(1.08); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        @media (max-width: 860px) {
            .hero-inner { flex-direction: column; gap: 2.5rem; text-align: center; }
            .profile-image { width: 220px; height: 280px; }
            .navigation { justify-content: center; }
        }

        @media (max-width: 500px) {
            .profile-image { width: 180px; height: 230px; }
            .name { font-size: 2.6rem; }
        }
    </style>
</head>

<body>
    <!-- Canvas tech animation -->
    <canvas id="tech-canvas"></canvas>

    <main class="hero">
        <div class="hero-inner">

            <div class="photo-frame">
                <img src="picture.png" alt="Parboni Chattopadhyay" class="profile-image">
            </div>

            <div class="hero-text">
                <p class="hero-label">✦ Portfolio</p>
                <h1 class="name">Hi! I'm Parboni :)</h1>
                <p class="title"><span id="typed-text"></span><span class="cursor"></span></p>
                <nav class="navigation">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="experience.html" class="nav-link">Experience</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>
        </div>

        <a class="scroll-hint" href="about.html">
            <span>Explore</span>
            <div class="scroll-line"></div>
        </a>
    </main>

    <script src="script.js"></script>
    <script>
    // ============================================================
    //  TECH CANVAS — floating geometric nodes + connection lines
    // ============================================================
    (function() {
        const canvas = document.getElementById('tech-canvas');
        const ctx    = canvas.getContext('2d');

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const COLORS  = ['#ff6fa3', '#c792ea', '#89ca78', '#e2b93d', '#dbd9c8'];
        const SHAPES  = ['circle', 'triangle', 'diamond', 'square'];
        const COUNT   = 70;
        const CONNECT = 160;

        class Node {
            constructor() { this.reset(true); }
            reset(init) {
                this.x     = Math.random() * canvas.width;
                this.y     = init ? Math.random() * canvas.height : -20;
                this.vx    = (Math.random() - 0.5) * 0.55;
                this.vy    = (Math.random() - 0.5) * 0.55;
                this.size  = Math.random() * 3 + 1.2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = Math.random() * 0.45 + 0.15;
                this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                this.pulse = Math.random() * Math.PI * 2;
            }
            update() {
                this.x     += this.vx;
                this.y     += this.vy;
                this.pulse += 0.02;
                if (this.x < -20)              this.x = canvas.width + 20;
                if (this.x > canvas.width + 20) this.x = -20;
                if (this.y < -20)              this.y = canvas.height + 20;
                if (this.y > canvas.height + 20) this.y = -20;
            }
            draw() {
                const s = this.size * (1 + Math.sin(this.pulse) * 0.18);
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle   = this.color;
                ctx.strokeStyle = this.color;
                ctx.lineWidth   = 1;
                ctx.shadowColor = this.color;
                ctx.shadowBlur  = 6;
                ctx.beginPath();
                if (this.shape === 'circle') {
                    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - s * 2);
                    ctx.lineTo(this.x + s * 1.7, this.y + s);
                    ctx.lineTo(this.x - s * 1.7, this.y + s);
                    ctx.closePath();
                    ctx.stroke();
                } else if (this.shape === 'diamond') {
                    ctx.moveTo(this.x, this.y - s * 2);
                    ctx.lineTo(this.x + s * 1.2, this.y);
                    ctx.lineTo(this.x, this.y + s * 2);
                    ctx.lineTo(this.x - s * 1.2, this.y);
                    ctx.closePath();
                    ctx.stroke();
                } else {
                    ctx.strokeRect(this.x - s, this.y - s, s * 2, s * 2);
                }
                ctx.restore();
            }
        }

        const nodes = Array.from({ length: COUNT }, () => new Node());

        function drawConnections() {
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx   = nodes[i].x - nodes[j].x;
                    const dy   = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECT) {
                        const ratio = 1 - dist / CONNECT;
                        ctx.save();
                        ctx.globalAlpha = ratio * 0.18;
                        ctx.strokeStyle = nodes[i].color;
                        ctx.lineWidth   = ratio * 1.2;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            nodes.forEach(n => { n.update(); n.draw(); });
            drawConnections();
            requestAnimationFrame(loop);
        }

        loop();
    })();
    </script>
</body>
</html>
