<head>
    <meta charset="utf-8">
    <meta name="author" content="Parboni Chattopadhyay">
    <meta name="description" content="Personal portfolio website">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parboni Chattopadhyay</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Lora:ital@1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>

        /* === AURORA BACKGROUND === */
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--bg);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: drift ease-in-out infinite;
            pointer-events: none;
        }

        /* Pink — top left */
        .orb-1 {
            width: 55vw; height: 55vw;
            background: radial-gradient(circle, rgba(255,100,160,0.18) 0%, transparent 70%);
            top: -20%; left: -15%;
            animation-duration: 28s;
            animation-delay: 0s;
        }

        /* Lavender — top right */
        .orb-2 {
            width: 45vw; height: 45vw;
            background: radial-gradient(circle, rgba(199,146,234,0.15) 0%, transparent 70%);
            top: -10%; right: -10%;
            animation-duration: 22s;
            animation-delay: -7s;
        }

        /* Muted green — bottom right */
        .orb-3 {
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(137,202,120,0.12) 0%, transparent 70%);
            bottom: -15%; right: -10%;
            animation-duration: 32s;
            animation-delay: -14s;
        }

        /* Warm pink — bottom left */
        .orb-4 {
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(255,140,190,0.1) 0%, transparent 70%);
            bottom: 5%; left: 5%;
            animation-duration: 25s;
            animation-delay: -4s;
        }

        /* Center glow */
        .orb-5 {
            width: 30vw; height: 30vw;
            background: radial-gradient(circle, rgba(226,185,61,0.07) 0%, transparent 70%);
            top: 40%; left: 40%;
            animation-duration: 18s;
            animation-delay: -9s;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(4vw, -3vh) scale(1.06); }
            50%  { transform: translate(-2vw, 5vh) scale(0.95); }
            75%  { transform: translate(5vw, 2vh) scale(1.03); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Subtle noise texture overlay */
        .aurora-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        /* === HERO LAYOUT === */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }

        .hero-inner {
            display: flex;
            align-items: center;
            gap: 5rem;
            max-width: 1100px;
            width: 100%;
        }

        /* === PHOTO FRAME === */
        .photo-frame {
            position: relative;
            flex-shrink: 0;
        }

        /* Pink rotating border */
        .photo-frame::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(255,100,160,0.3);
            border-radius: 4px;
            transform: rotate(3deg);
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), border-color 0.4s ease;
        }

        .photo-frame:hover::before {
            transform: rotate(0deg);
            border-color: rgba(255,100,160,0.65);
        }

        /* Lavender outer border */
        .photo-frame::after {
            content: '';
            position: absolute;
            inset: -18px;
            border: 1px solid rgba(199,146,234,0.12);
            border-radius: 4px;
            transform: rotate(-1.5deg);
            transition: transform 0.6s cubic-bezier(0.4,0,0.2,1), border-color 0.4s ease;
        }

        .photo-frame:hover::after {
            transform: rotate(0deg);
            border-color: rgba(199,146,234,0.3);
        }

        .profile-image {
            width: 300px;
            height: 380px;
            object-fit: cover;
            object-position: top center;
            display: block;
            border-radius: 3px;
            filter: none;
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), box-shadow 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .photo-frame:hover .profile-image {
            transform: scale(1.01);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 50px rgba(255,100,160,0.12);
        }

        /* === TEXT SIDE === */
        .hero-text { flex: 1; }

        .hero-label {
            font-size: 0.68rem;
            color: var(--accent);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1.3rem;
            font-family: 'Space Grotesk', sans-serif;
            opacity: 0;
            animation: fadeInUp 0.7s ease 0.1s forwards;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 5.5vw, 5.5rem);
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.04em;
            line-height: 1.05;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(24px);
            animation: fadeInUp 0.8s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
        }

        /* "Hi! I'm" in pink */
        .name .greeting {
            color: #ff6fa3;
            display: block;
        }

        /* "Parboni :)" in cream */
        .name .myname {
            color: var(--text-bright);
            display: block;
        }

        .title {
            font-size: 1.05rem;
            color: var(--accent);
            font-weight: 400;
            letter-spacing: 0.01em;
            min-height: 1.8em;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.35s forwards;
        }

        .navigation { display: flex; gap: 0.6rem; flex-wrap: wrap; }

        /* Scroll hint */
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }

        .scroll-hint span {
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 38px;
            background: linear-gradient(to bottom, rgba(255,100,160,0.5), transparent);
            animation: scrollPulse 2.2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: #ff6fa3;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @media (max-width: 860px) {
            .hero-inner { flex-direction: column; gap: 2.5rem; text-align: center; }
            .profile-image { width: 220px; height: 280px; }
            .navigation { justify-content: center; }
            .hero-label { text-align: center; }
        }

        @media (max-width: 500px) {
            .profile-image { width: 180px; height: 230px; }
            .name { font-size: 2.6rem; }
        }
    </style>
</head>

<body>

    <!-- Aurora background (replaces particles) -->
    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <main class="hero">
        <div class="hero-inner">

            <!-- Photo -->
            <div class="photo-frame">
                <img src="picture.png" alt="Parboni Chattopadhyay" class="profile-image" id="profile-image">
            </div>

            <!-- Text -->
            <div class="hero-text">
                <p class="hero-label">Portfolio</p>
                <h1 class="name">
                    <span class="greeting">Hi! I'm</span>
                    <span class="myname">Parboni :)</span>
                </h1>
                <p class="title"><span id="typed-text"></span><span class="cursor"></span></p>
                <nav class="navigation">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="experience.html" class="nav-link">Experience</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>

        </div>

        <div class="scroll-hint">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
