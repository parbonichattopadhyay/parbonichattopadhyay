<head>
    <meta charset="utf-8">

    <meta name="description" content="Personal portfolio website">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* === HERO LAYOUT === */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }

        .hero-inner {
            display: flex;
            align-items: center;
            gap: 5rem;
            max-width: 1100px;
            width: 100%;
        }

        /* === PHOTO FRAME === */
        .photo-frame {
            position: relative;
            flex-shrink: 0;
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(137,202,120,0.22);
            border-radius: 4px;
            transform: rotate(3deg);
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), border-color 0.4s ease;
        }

        .photo-frame:hover::before {
            transform: rotate(0deg);
            border-color: rgba(137,202,120,0.5);
        }

        .photo-frame::after {
            content: '';
            position: absolute;
            inset: -18px;
            border: 1px solid rgba(199,146,234,0.1);
            border-radius: 4px;
            transform: rotate(-1.5deg);
            transition: transform 0.6s cubic-bezier(0.4,0,0.2,1), border-color 0.4s ease;
        }

        .photo-frame:hover::after {
            transform: rotate(0deg);
            border-color: rgba(199,146,234,0.25);
        }

        .profile-image {
            width: 300px;
            height: 380px;
            object-fit: cover;
            object-position: top center;
            display: block;
            border-radius: 3px;
            filter: grayscale(70%) contrast(1.05) sepia(10%);
            transition: filter 0.5s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1), box-shadow 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .photo-frame:hover .profile-image {
            filter: grayscale(0%) contrast(1) sepia(0%);
            transform: scale(1.01);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(137,202,120,0.08);
        }

        /* === TEXT SIDE === */
        .hero-text { flex: 1; }

        .hero-label {
            font-size: 0.68rem;
            color: var(--accent);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1.3rem;
            font-family: 'Space Grotesk', sans-serif;
            opacity: 0;
            animation: fadeInUp 0.7s ease 0.1s forwards;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 5.5vw, 5.5rem);
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.04em;
            line-height: 1.0;
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(24px);
            animation: fadeInUp 0.8s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
        }

        .name em {
            font-style: italic;
            font-family: 'Lora', serif;
            color: var(--accent-2);
            font-size: 0.85em;
        }

        .title {
            font-size: 1.05rem;
            color: var(--accent);
            font-weight: 400;
            letter-spacing: 0.01em;
            min-height: 1.8em;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.35s forwards;
        }

        .navigation { display: flex; gap: 0.6rem; flex-wrap: wrap; }

        /* Scroll hint */
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }

        .scroll-hint span {
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 38px;
            background: linear-gradient(to bottom, rgba(137,202,120,0.4), transparent);
            animation: scrollPulse 2.2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @media (max-width: 860px) {
            .hero-inner { flex-direction: column; gap: 2.5rem; text-align: center; }
            .profile-image { width: 220px; height: 280px; }
            .navigation { justify-content: center; }
            .hero-label { text-align: center; }
        }

        @media (max-width: 500px) {
            .profile-image { width: 180px; height: 230px; }
            .name { font-size: 2.6rem; }
        }
    </style>
</head>

<body>
    <div id="particles-js"></div>

    <main class="hero">
        <div class="hero-inner">

            <!-- Photo -->
            <div class="photo-frame">
                <img src="picture.png" alt="Parboni Chattopadhyay" class="profile-image" id="profile-image">
            </div>

            <!-- Text -->
            <div class="hero-text">
                <p class="hero-label">Portfolio</p>
                <h1 class="name">Hi! I'm<br>Parboni :)</h1>
                <p class="title"><span id="typed-text"></span><span class="cursor"></span></p>
                <nav class="navigation">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="experience.html" class="nav-link">Experience</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>

        </div>

        <div class="scroll-hint">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
